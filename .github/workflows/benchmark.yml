name: Benchmarks

on:
  workflow_dispatch:
    inputs:
      benchmark:
        description: Benchmark to run
        required: false
        default: simulation_update
        type: choice
        options:
          - all
          - simulation_update
          - aggregate_social
          - simulation_ticks
          - spatial_hash
          - metrics
          - noise
      boid_counts:
        description: Optional comma-separated boid counts
        required: false
      thread_counts:
        description: Optional comma-separated worker thread counts for focused benchmarks
        required: false
      scenario:
        description: Optional exact CSV scenario filter; leave blank or use all to keep every row
        required: false
      models:
        description: Optional comma-separated simulation model filters for focused benchmarks
        required: false
      modes:
        description: Optional comma-separated benchmark mode filters for focused benchmarks
        required: false
      duration_seconds:
        description: Optional simulated measured duration in seconds
        required: false
      sample_seconds:
        description: Optional simulated sample window in seconds
        required: false
      warmup_seconds:
        description: Optional simulated warm-up duration in seconds
        required: false
      repetitions:
        description: Optional repetitions for simulation_ticks
        required: false
      tick_dt:
        description: Optional fixed tick delta time in seconds for simulation_ticks
        required: false
      tick_rate:
        description: Optional fixed tick rate in Hz for simulation_ticks
        required: false
      seed:
        description: Optional random seed override
        required: false
      chunk_size:
        description: Optional deterministic worker chunk size in boids for focused benchmarks
        required: false
      diagnostics:
        description: Optional diagnostics/profile level for focused benchmarks
        required: false
        type: choice
        default: none
        options:
          - none
          - phases
          - workers
          - full
      hardware_threads:
        description: Append this runner's hardware thread count to focused benchmark thread counts
        required: false
        type: boolean
        default: false
      full_matrix:
        description: Use focused benchmark broad default count/thread/duration matrix
        required: false
        type: boolean
        default: false
      benchmark_args:
        description: Optional extra benchmark executable args, e.g. --world-size 60 --adaptive-perception on
        required: false
      runner_label:
        description: Optional runner label, e.g. ubuntu-latest or self-hosted
        required: false
        default: ubuntu-latest

jobs:
  run-benchmarks:
    name: Run ${{ inputs.benchmark || 'simulation_update' }} benchmarks
    runs-on: ${{ inputs.runner_label || 'ubuntu-latest' }}
    timeout-minutes: 90
    env:
      CMAKE_PRESET: ci-release-ninja
      FLOCK3D_BENCHMARK_PRESET: ci-release-ninja
      OUTPUT_DIR: outputs/benchmarks/github-${{ github.run_id }}
      BENCHMARK: ${{ inputs.benchmark || 'simulation_update' }}
      BOID_COUNTS: ${{ inputs.boid_counts }}
      THREAD_COUNTS: ${{ inputs.thread_counts }}
      SCENARIO: ${{ inputs.scenario }}
      BENCHMARK_MODELS: ${{ inputs.models }}
      BENCHMARK_MODES: ${{ inputs.modes }}
      DURATION_SECONDS: ${{ inputs.duration_seconds }}
      SAMPLE_SECONDS: ${{ inputs.sample_seconds }}
      WARMUP_SECONDS: ${{ inputs.warmup_seconds }}
      REPETITIONS: ${{ inputs.repetitions }}
      TICK_DT: ${{ inputs.tick_dt }}
      TICK_RATE: ${{ inputs.tick_rate }}
      BENCHMARK_SEED: ${{ inputs.seed }}
      CHUNK_SIZE: ${{ inputs.chunk_size }}
      DIAGNOSTICS: ${{ inputs.diagnostics || 'none' }}
      HARDWARE_THREADS: ${{ inputs.hardware_threads || false }}
      FULL_MATRIX: ${{ inputs.full_matrix || false }}
      EXTRA_BENCHMARK_ARGS: ${{ inputs.benchmark_args }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake ninja-build g++ pkg-config python3-pip \
            libasound2-dev libgl1-mesa-dev libglu1-mesa-dev \
            libx11-dev libxcursor-dev libxext-dev libxi-dev libxinerama-dev \
            libxrandr-dev libxxf86vm-dev

      - name: Install plotting dependencies
        run: python3 -m pip install --user pandas matplotlib

      - name: Run selected benchmark
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${OUTPUT_DIR}"
          exec > >(tee "${OUTPUT_DIR}/benchmark.log") 2>&1

          echo "benchmark=${BENCHMARK}"
          echo "boid_counts=${BOID_COUNTS}"
          echo "thread_counts=${THREAD_COUNTS}"
          echo "scenario_filter=${SCENARIO}"
          echo "models=${BENCHMARK_MODELS}"
          echo "modes=${BENCHMARK_MODES}"
          echo "diagnostics=${DIAGNOSTICS}"
          echo "hardware_threads=${HARDWARE_THREADS}"
          echo "full_matrix=${FULL_MATRIX}"
          echo "preset=${FLOCK3D_BENCHMARK_PRESET} (CMAKE_BUILD_TYPE=Release)"

          common_args=()
          [[ -n "${DURATION_SECONDS}" ]] && common_args+=(--duration "${DURATION_SECONDS}")
          [[ -n "${SAMPLE_SECONDS}" ]] && common_args+=(--sample "${SAMPLE_SECONDS}")
          [[ -n "${WARMUP_SECONDS}" ]] && common_args+=(--warmup "${WARMUP_SECONDS}")

          common_extra=()
          ticks_extra=()
          [[ -n "${BOID_COUNTS}" ]] && common_extra+=(--counts "${BOID_COUNTS}")
          [[ -n "${BOID_COUNTS}" ]] && ticks_extra+=(--counts "${BOID_COUNTS}")
          [[ -n "${THREAD_COUNTS}" ]] && common_extra+=(--threads "${THREAD_COUNTS}")
          [[ -n "${BENCHMARK_MODELS}" ]] && common_extra+=(--models "${BENCHMARK_MODELS}")
          [[ -n "${BENCHMARK_MODES}" ]] && common_extra+=(--modes "${BENCHMARK_MODES}")
          [[ -n "${BENCHMARK_SEED}" ]] && common_extra+=(--seed "${BENCHMARK_SEED}")
          [[ -n "${BENCHMARK_SEED}" ]] && ticks_extra+=(--seed "${BENCHMARK_SEED}")
          [[ -n "${CHUNK_SIZE}" ]] && common_extra+=(--chunk-size "${CHUNK_SIZE}")
          [[ "${DIAGNOSTICS}" != "" && "${DIAGNOSTICS}" != "none" ]] && common_extra+=(--diagnostics "${DIAGNOSTICS}")
          [[ "${HARDWARE_THREADS}" == "true" ]] && common_extra+=(--hardware-threads)
          [[ "${FULL_MATRIX}" == "true" ]] && common_extra+=(--full-matrix)
          if [[ -n "${EXTRA_BENCHMARK_ARGS}" ]]; then
            while IFS= read -r -d '' arg; do
              common_extra+=("${arg}")
            done < <(python3 -c 'import shlex, sys; [sys.stdout.buffer.write(value.encode() + b"\0") for value in shlex.split(sys.argv[1])]' "${EXTRA_BENCHMARK_ARGS}")
          fi
          [[ -n "${REPETITIONS}" ]] && ticks_extra+=(--repetitions "${REPETITIONS}")
          [[ -n "${TICK_DT}" ]] && ticks_extra+=(--dt "${TICK_DT}")
          [[ -n "${TICK_RATE}" ]] && ticks_extra+=(--tick-rate "${TICK_RATE}")

          run_common() {
            local name="$1"
            scripts/run_benchmark.sh --preset "${FLOCK3D_BENCHMARK_PRESET}" --output-dir "${OUTPUT_DIR}" "${common_args[@]}" "$name" -- "${common_extra[@]}"
          }

          run_ticks() {
            scripts/run_benchmark.sh --preset "${FLOCK3D_BENCHMARK_PRESET}" --output-dir "${OUTPUT_DIR}" "${common_args[@]}" simulation_ticks -- "${ticks_extra[@]}"
          }

          case "${BENCHMARK}" in
            all)
              for name in simulation_update aggregate_social spatial_hash metrics noise; do
                run_common "$name"
              done
              run_ticks
              ;;
            simulation_ticks)
              run_ticks
              ;;
            simulation_update|aggregate_social|spatial_hash|metrics|noise)
              run_common "${BENCHMARK}"
              ;;
            *)
              echo "Unknown benchmark: ${BENCHMARK}" >&2
              exit 2
              ;;
          esac


      - name: Filter scenario rows
        if: inputs.scenario != '' && inputs.scenario != 'all'
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import csv
          from pathlib import Path
          scenario = "${{ env.SCENARIO }}"
          output_dir = Path("${{ env.OUTPUT_DIR }}")
          matched = 0
          for path in output_dir.glob("*.csv"):
              with path.open(newline="") as src:
                  reader = csv.DictReader(src)
                  if not reader.fieldnames or "scenario" not in reader.fieldnames:
                      continue
                  rows = [row for row in reader if row.get("scenario") == scenario]
              if not rows:
                  continue
              backup = path.with_suffix(".all.csv")
              path.rename(backup)
              with path.open("w", newline="") as dst:
                  writer = csv.DictWriter(dst, fieldnames=reader.fieldnames)
                  writer.writeheader()
                  writer.writerows(rows)
              matched += len(rows)
              print(f"Filtered {path.name}: kept {len(rows)} rows; original saved as {backup.name}")
          if matched == 0:
              print(f"No CSV rows matched scenario={scenario!r}; unfiltered CSV files are still uploaded.")
          PY

      - name: Summarize benchmark CSV
        shell: bash
        run: scripts/summarize_benchmarks.py --input-dir "${OUTPUT_DIR}" --output "${OUTPUT_DIR}/benchmark_summary.csv"

      - name: Generate plots
        shell: bash
        run: scripts/plot_benchmarks.sh --input-dir "${OUTPUT_DIR}"

      - name: Upload benchmark artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flock3d-benchmarks-${{ inputs.benchmark || 'simulation_update' }}-${{ github.run_id }}
          path: |
            ${{ env.OUTPUT_DIR }}/**
          if-no-files-found: error
